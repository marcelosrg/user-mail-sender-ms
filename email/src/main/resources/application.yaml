    name: email

  rabbitmq:
    addresses: amqps://xgodbzge:c_necO-Z_OTYXlQHsLvsv54GMNkf_llQ@duck.lmq.cloudamqp.com/xgodbzge

  datasource:
    url: jdbc:postgresql://localhost:5433/ms_email_ms
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
